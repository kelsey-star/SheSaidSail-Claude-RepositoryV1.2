<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>SSS Portal</title>
<style>
:root {
  --bg: #0a0a0a;
  --card: #141414;
  --card2: #1c1c1c;
  --gold: #c9a96e;
  --red: #e53e3e;
  --amber: #d69e2e;
  --green: #38a169;
  --text: #f7f7f7;
  --muted: #808080;
  --border: #252525;
  --tab-h: 64px;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
#root{height:100%}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* LAYOUT */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden}
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 14px calc(var(--tab-h) + var(--safe-b) + 20px);padding-top:calc(var(--safe-t) + 14px)}
.section{margin-bottom:24px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted)}

/* TAB BAR */
.tab-bar{flex-shrink:0;height:calc(var(--tab-h) + var(--safe-b));padding-bottom:var(--safe-b);background:#111;border-top:1px solid var(--border);display:flex;align-items:flex-start;z-index:100}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 0;cursor:pointer;color:var(--muted);transition:color .12s;min-height:var(--tab-h);position:relative}
.tab-item.active{color:var(--gold)}
.tab-item svg{width:20px;height:20px;flex-shrink:0}
.tab-lbl{font-size:8.5px;letter-spacing:1.2px;text-transform:uppercase;line-height:1}
.tab-dot{position:absolute;top:8px;right:calc(50% - 14px);width:6px;height:6px;border-radius:3px;background:var(--red)}
.tab-dot.amber{background:var(--amber)}

/* CARDS */
.card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px 16px;margin-bottom:10px}
.card.red-border{border-color:rgba(229,62,62,.4)}
.card.amber-border{border-color:rgba(214,158,46,.35)}
.card.gold-border{border-color:rgba(201,169,110,.35)}

/* STATS */
.stat-row{display:flex;gap:10px;margin-bottom:10px}
.stat{flex:1;background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px 16px}
.stat-val{font-size:26px;font-weight:700;line-height:1;margin-bottom:4px;letter-spacing:-.5px}
.stat-lbl{font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.stat.gold .stat-val{color:var(--gold)}
.stat.red .stat-val{color:var(--red)}
.stat.amber .stat-val{color:var(--amber)}
.stat.green .stat-val{color:var(--green)}

/* BUTTONS */
.btn{height:52px;border:none;border-radius:8px;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:0 18px;transition:opacity .1s;flex-shrink:0}
.btn:active{opacity:.65}
.btn-gold{background:var(--gold);color:#0a0a0a}
.btn-red{background:var(--red);color:#fff}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-sm{height:38px;font-size:10.5px;padding:0 14px;border-radius:7px;letter-spacing:1px}
.btn-full{width:100%}

/* BADGES & CHIPS */
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;font-size:10px;font-weight:700;padding:0 5px}
.badge-red{background:var(--red);color:#fff}
.badge-amber{background:var(--amber);color:#0a0a0a}
.badge-gold{background:var(--gold);color:#0a0a0a}
.badge-muted{background:var(--border);color:var(--muted)}
.chip{display:inline-flex;align-items:center;gap:4px;height:22px;padding:0 9px;border-radius:11px;font-size:9.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
.chip-red{background:rgba(229,62,62,.12);color:var(--red)}
.chip-amber{background:rgba(214,158,46,.12);color:var(--amber)}
.chip-green{background:rgba(56,161,105,.12);color:var(--green)}
.chip-gold{background:rgba(201,169,110,.12);color:var(--gold)}
.chip-muted{background:rgba(160,160,160,.08);color:var(--muted)}

/* SKELETON */
.skel{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* EMERGENCY BANNER */
.e-banner{background:var(--red);color:#fff;padding:10px 16px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;flex-shrink:0}

/* FLOATING ACTION BUTTON */
.fab{position:fixed;right:18px;bottom:calc(var(--tab-h) + var(--safe-b) + 18px);width:52px;height:52px;border-radius:26px;background:var(--gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(201,169,110,.35);z-index:90}
.fab svg{width:22px;height:22px;color:#0a0a0a}

/* DRAWER */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:150;animation:fadeIn .15s ease}
.drawer{position:fixed;bottom:0;left:0;right:0;max-height:82vh;background:#111;border-top:1px solid var(--border);border-radius:18px 18px 0 0;z-index:160;display:flex;flex-direction:column;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.drawer-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;flex-shrink:0}
.drawer-inner{flex:1;overflow-y:auto;padding:12px 16px 24px}
.drawer-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:4px 0 16px}

/* CHAT */
.chat-msgs{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;min-height:100px}
.chat-msg{padding:10px 13px;border-radius:10px;font-size:13px;line-height:1.65;max-width:88%}
.chat-msg.user{background:rgba(201,169,110,.13);align-self:flex-end;border-bottom-right-radius:3px}
.chat-msg.ai{background:var(--card);align-self:flex-start;border-bottom-left-radius:3px;color:var(--text)}
.chat-msg.err{background:rgba(229,62,62,.1);color:var(--red);align-self:flex-start}
.chat-row{display:flex;gap:8px;padding-top:4px;border-top:1px solid var(--border)}
.chat-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--text);font-size:14px;outline:none;resize:none;font-family:inherit;height:42px}
.chat-input:focus{border-color:var(--gold)}

/* AUTH */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
.auth-card{background:var(--card);border-radius:16px;padding:36px 28px;width:100%;max-width:340px;border:1px solid var(--border)}
.auth-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:13px 15px;color:var(--text);font-size:16px;outline:none;margin:20px 0}
.auth-input:focus{border-color:var(--gold)}

/* MODAL */
.modal-wrap{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.7);animation:fadeIn .15s ease}
.modal-card{background:#1a1a1a;border-radius:14px;padding:24px;width:100%;max-width:360px;border:1px solid var(--border)}
.modal-title{font-size:15px;font-weight:600;margin-bottom:14px}
.modal-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:16px;outline:none;margin-bottom:14px}
.modal-input:focus{border-color:var(--gold)}
.modal-row{display:flex;gap:10px}

/* MISC */
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;line-height:1.7}
.meta{display:flex;gap:14px;flex-wrap:wrap;margin-top:7px}
.meta-item{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:3px}
.meta-item b{color:var(--text);font-weight:500}
.row{display:flex;align-items:center;gap:8px}
.row-between{display:flex;align-items:center;justify-content:space-between}
.row-wrap{display:flex;gap:8px;flex-wrap:wrap;padding-top:10px;border-top:1px solid var(--border);margin-top:10px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* SETUP SCREEN */
.setup-screen{min-height:100vh;background:var(--bg);padding:32px 20px;display:flex;align-items:flex-start;justify-content:center}
.setup-inner{width:100%;max-width:600px}
.code-block{background:#0f0f0f;border:1px solid var(--border);border-radius:8px;padding:14px;font-family:monospace;font-size:12px;color:var(--gold);margin:10px 0;overflow-x:auto;white-space:pre}

/* TOAST */
.toast-wrap{position:fixed;top:calc(var(--safe-t) + 10px);left:12px;right:12px;z-index:500;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:11px 14px;border-radius:9px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.5);animation:fadeIn .2s ease;pointer-events:all}
.toast.success{background:#1a1a1a;border-left:3px solid var(--green);color:var(--text)}
.toast.error{background:#1a1a1a;border-left:3px solid var(--red);color:var(--red)}
.toast.info{background:#1a1a1a;border-left:3px solid var(--gold);color:var(--text)}

/* LEAD CARD */
.lead-name{font-size:15px;font-weight:600;margin-bottom:2px}
.booking-name{font-size:14px;font-weight:600}

/* LAST REFRESHED */
.refresh-row{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.refresh-time{font-size:10px;color:var(--muted);letter-spacing:.5px}
</style>
</head>
<body style="background:#0a0a0a">

<div id="splash" style="position:fixed;inset:0;background:#0a0a0a;display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:10px">
  <p style="color:#c9a96e;font-size:10px;letter-spacing:3px;text-transform:uppercase">She Said Sail</p>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<script type="text/babel">
/* ═══════════════════════════════════════════════════════════════
   CONFIGURATION — Edit the values in this block before use
   ═══════════════════════════════════════════════════════════════ */
const CONFIG = {
  OWNER_PASSWORD:   'changeme',
  AIRTABLE_TOKEN:   '',               // Your Airtable Personal Access Token (pat...)
  AIRTABLE_BASE:    'appdZ49WqgjRXxA1R',
  ANTHROPIC_KEY:    '',               // Optional — for AI Chat tab
  AI_MODEL:         'claude-haiku-4-5-20251001',

  WEBHOOKS: {

    LESSONS:        '',   // Fill in after creating per airtable-schema.md
  },

  FIELDS: {
    REQ_STATUS:     'fldv1NEyNPuXqv5bT',
    REQ_RESP_NEEDED:'fld0j40yNp0zElDqH',
    BK_STATUS:      'fldf51usvsXDhp2tf',
    BK_DATE:        'fldCzvnOsy7WgdOTa',
    BK_EMERGENCY:   'fldHxfGgVuAH1SKBO',
    BK_URGENCY:     'fldxgqZLuMKf63Mjl',
    CL_HV:          'fldlEaA9g9LqZIjoJ',
    CL_REDFLAG:     'fldvF29XvKfWp3DdP',
    CL_HEALTH:      'fldnkCG9a1uxlQBB9',
  },
};

/* ═══════════════════════════════════════════════════════════════
   AIRTABLE API LAYER
   ═══════════════════════════════════════════════════════════════ */
const AT = {
  h: () => ({
    'Authorization': `Bearer ${CONFIG.AIRTABLE_TOKEN}`,
    'Content-Type': 'application/json',
  }),

  async get(tableId, { filterByFormula, sort, fields, pageSize, offset, maxRecords } = {}) {
    if (!tableId) throw new Error('Table ID not configured');
    const qs = new URLSearchParams();
    if (filterByFormula) qs.set('filterByFormula', filterByFormula);
    if (maxRecords)      qs.set('maxRecords', maxRecords);
    if (pageSize)        qs.set('pageSize', pageSize || 100);
    if (offset)          qs.set('offset', offset);
    if (sort)            sort.forEach((s, i) => {
      qs.set(`sort[${i}][field]`, s.field);
      if (s.direction) qs.set(`sort[${i}][direction]`, s.direction);
    });
    if (fields)          fields.forEach(f => qs.append('fields[]', f));
    const url = `https://api.airtable.com/v0/${CONFIG.AIRTABLE_BASE}/${tableId}?${qs}`;
    const res = await fetch(url, { headers: this.h() });
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error?.message || `HTTP ${res.status}`); }
    return res.json();
  },

  async getAll(tableId, params = {}) {
    let records = [], offset;
    do {
      const data = await this.get(tableId, { ...params, pageSize: 100, offset });
      records = records.concat(data.records || []);
      offset = data.offset;
    } while (offset);
    return records;
  },

  async patch(tableId, recordId, fields) {
    const url = `https://api.airtable.com/v0/${CONFIG.AIRTABLE_BASE}/${tableId}/${recordId}`;
    const res = await fetch(url, { method: 'PATCH', headers: this.h(), body: JSON.stringify({ fields }) });
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error?.message || `HTTP ${res.status}`); }
    return res.json();
  },

  async post(tableId, fields) {
    const url = `https://api.airtable.com/v0/${CONFIG.AIRTABLE_BASE}/${tableId}`;
    const res = await fetch(url, { method: 'POST', headers: this.h(), body: JSON.stringify({ records: [{ fields }] }) });
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error?.message || `HTTP ${res.status}`); }
    return res.json();
  },
};

/* ═══════════════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════════════ */
const f = (fields, ...names) => {
  for (const n of names) if (fields && fields[n] !== undefined && fields[n] !== null) return fields[n];
  return null;
};
const fmtMoney = n => !n && n !== 0 ? '—' : '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
const fmtDate = d => { if (!d) return '—'; return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); };
const fmtDateShort = d => { if (!d) return '—'; return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); };
const hoursAgo = d => d ? Math.floor((Date.now() - new Date(d)) / 3600000) : 999;
const daysAgo  = d => d ? Math.floor((Date.now() - new Date(d)) / 86400000) : 999;
const timeAgo  = d => {
  if (!d) return '';
  const s = Math.floor((Date.now() - new Date(d)) / 1000);
  if (s < 60)   return 'just now';
  const m = Math.floor(s / 60);
  if (m < 60)   return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24)   return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
};
const isToday = d => d && new Date(d).toDateString() === new Date().toDateString();
const soMonth = (offset = 0) => { const d = new Date(); d.setDate(1); d.setHours(0,0,0,0); d.setMonth(d.getMonth() + offset); return d; };
const eoMonth = (offset = 0) => { const d = soMonth(offset + 1); d.setMilliseconds(-1); return d; };
const inMonth = (d, offset = 0) => { if (!d) return false; const dt = new Date(d); return dt >= soMonth(offset) && dt <= eoMonth(offset); };
const sum = (arr, fn) => arr.reduce((a, r) => a + (Number(fn(r)) || 0), 0);

const auditLog = async (event, details, recordId = '') => {
  if (!CONFIG.TABLES.AUDIT_LOG) return;
  try {
    await AT.post(CONFIG.TABLES.AUDIT_LOG, {
      'Event': event,
      'Actor': 'Owner Portal',
      'Timestamp': new Date().toISOString(),
      'Details': details,
      'Record_ID': recordId,
      'Source_System': 'Owner Portal',
      'Environment': 'Production',
    });
  } catch (e) { /* Audit log writes are best-effort */ }
};

  logout:   'M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1',
};

function Icon({ n, sz = 20, color = 'currentColor' }) {
  return (
    <svg width={sz} height={sz} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <path d={IC[n]} />
    </svg>
  );
}

/* ═══════════════════════════════════════════════════════════════
   COMMON COMPONENTS
   ═══════════════════════════════════════════════════════════════ */
function Skel({ h = 18, w = '100%', mb = 8 }) {
  return <div className="skel" style={{ height: h, width: w, marginBottom: mb }} />;
}

function EmptyState({ msg }) {
  return <div className="empty"><p>{msg}</p></div>;
}

/* Double-tap confirm button — for financial actions */
function ConfirmBtn({ label, onConfirm, className = 'btn btn-red btn-sm', confirmLabel = 'CONFIRM?' }) {
  const [state, setState] = React.useState('idle');
  const timer = React.useRef(null);
  const tap = () => {
    if (state === 'confirm') { clearTimeout(timer.current); setState('idle'); onConfirm(); }
    else { setState('confirm'); timer.current = setTimeout(() => setState('idle'), 3000); }
  };
  React.useEffect(() => () => clearTimeout(timer.current), []);
  return (
    <button className={`${className}${state === 'confirm' ? ' btn-amber' : ''}`}
      style={state === 'confirm' ? { background: 'var(--amber)', color: '#0a0a0a' } : {}}
      onClick={tap}>
      {state === 'confirm' ? confirmLabel : label}
    </button>
  );
}

/* Chip component */
function StatusChip({ status }) {
  const map = {
    NEW: ['chip-gold', 'NEW'],
    HOLD: ['chip-muted', 'HOLD'],
    CONTACTED: ['chip-amber', 'CONTACTED'],
    QUALIFIED: ['chip-green', 'QUALIFIED'],
    AVAILABILITY_PENDING: ['chip-amber', 'AVAIL CHECK'],
    AVAILABILITY_CONFIRMED: ['chip-green', 'CONFIRMED'],
    DEPOSIT_SENT: ['chip-amber', 'DEPOSIT SENT'],
    DEPOSIT_PAID: ['chip-green', 'DEPOSIT PAID'],
    AGREEMENT_PENDING: ['chip-amber', 'AGREEMENT'],
    CONFIRMED: ['chip-green', 'CONFIRMED'],
    BALANCE_DUE: ['chip-red', 'BALANCE DUE'],
    PAID: ['chip-green', 'PAID'],
    COMPLETED: ['chip-muted', 'COMPLETED'],
    CANCELLED: ['chip-red', 'CANCELLED'],
    VOID: ['chip-red', 'VOID'],
  };
  const [cls, lbl] = map[status] || ['chip-muted', status || '—'];
  return <span className={`chip ${cls}`}>{lbl}</span>;
}

function AuthGate({ onAuth }) {
  const [pw, setPw] = React.useState('');
  const [err, setErr] = React.useState(false);
  const [shake, setShake] = React.useState(false);

  const submit = () => {

/* ═══════════════════════════════════════════════════════════════
   PULSE TAB
   ═══════════════════════════════════════════════════════════════ */
function PulseTab({ leads, bookings, approvals, loading, lastFetched, onRefresh }) {
  const todayCharters = bookings.filter(b => {
    const d = f(b.fields, 'Charter Date', CONFIG.FIELDS.BK_DATE);
    return d && isToday(d) && !['CANCELLED','VOID'].includes(f(b.fields, 'Status', CONFIG.FIELDS.BK_STATUS));
  });

  const newLeads = leads.filter(b => f(b.fields, 'Status', CONFIG.FIELDS.REQ_STATUS) === 'NEW');
  const urgentLeads = newLeads.filter(b => hoursAgo(b.createdTime) >= 12);
  const overnightLeads = newLeads.filter(b => hoursAgo(b.createdTime) <= 24);

  const thisMonthRevenue = sum(
    bookings.filter(b => {
      const d = f(b.fields, 'Charter Date', CONFIG.FIELDS.BK_DATE);
      return d && inMonth(d, 0) && ['PAID','COMPLETED'].includes(f(b.fields, 'Status', CONFIG.FIELDS.BK_STATUS));
    }),
    b => f(b.fields, 'Total Revenue', 'Revenue', 'Charter Price', 'Total Amount') || 0
  );

  const lastMonthRevenue = sum(
    bookings.filter(b => {
      const d = f(b.fields, 'Charter Date', CONFIG.FIELDS.BK_DATE);
      return d && inMonth(d, -1) && ['PAID','COMPLETED'].includes(f(b.fields, 'Status', CONFIG.FIELDS.BK_STATUS));
    }),
    b => f(b.fields, 'Total Revenue', 'Revenue', 'Charter Price', 'Total Amount') || 0
  );

  const pendingApprovals = approvals.filter(a => f(a.fields, 'Decision') === 'Pending' || !f(a.fields, 'Decision')).length;

  const revDelta = thisMonthRevenue - lastMonthRevenue;
  const revDeltaPos = revDelta >= 0;

  return (
    <div>
      {/* Refresh row */}
      <div className="refresh-row">
        <span className="refresh-time">
          {lastFetched ? `Updated ${timeAgo(lastFetched)}` : 'Fetching...'}
        </span>
        <button className="btn btn-ghost btn-sm" style={{ height: 28, padding: '0 10px' }} onClick={onRefresh}>
          <Icon n="refresh" sz={12} /> Refresh
        </button>
      </div>

      {loading ? (
        <>
          <div className="stat-row"><div className="stat"><Skel h={28} mb={4} /><Skel h={12} w="60%" /></div><div className="stat"><Skel h={28} mb={4} /><Skel h={12} w="60%" /></div></div>
          <div className="stat-row"><div className="stat"><Skel h={28} mb={4} /><Skel h={12} w="60%" /></div><div className="stat"><Skel h={28} mb={4} /><Skel h={12} w="60%" /></div></div>
        </>
      ) : (
        <>
          <div className="stat-row">
            <div className={`stat${urgentLeads.length > 0 ? ' red' : ''}`}>
              <div className="stat-val" style={urgentLeads.length === 0 ? { color: 'var(--text)' } : {}}>
                {urgentLeads.length > 0 ? urgentLeads.length : newLeads.length}
              </div>
              <div className="stat-lbl">{urgentLeads.length > 0 ? 'Leads Waiting 12h+' : 'New Leads'}</div>
            </div>
            <div className={`stat${todayCharters.length > 0 ? ' gold' : ''}`}>
              <div className="stat-val" style={todayCharters.length === 0 ? { color: 'var(--text)' } : {}}>
                {todayCharters.length}
              </div>
              <div className="stat-lbl">Charters Today</div>
            </div>
          </div>

          <div className="stat-row">
            <div className="stat gold">
              <div className="stat-val">{fmtMoney(thisMonthRevenue)}</div>
              <div className="stat-lbl">
                This Month
                {lastMonthRevenue > 0 && (
                  <span style={{ color: revDeltaPos ? 'var(--green)' : 'var(--red)', marginLeft: 6 }}>
                    {revDeltaPos ? '+' : ''}{fmtMoney(revDelta)}
                  </span>
                )}
              </div>
            </div>
            <div className="stat">
              <div className="stat-val" style={pendingApprovals > 0 ? { color: 'var(--amber)' } : {}}>
                {pendingApprovals}
              </div>
              <div className="stat-lbl">Pending Decisions</div>
            </div>
          </div>
        </>
      )}

      {/* Today's charters */}
      {todayCharters.length > 0 && (
        <div className="section">
          <div className="section-header"><span className="section-title">Today's Charters</span></div>
          {todayCharters.map(b => (
            <div key={b.id} className="card gold-border">
              <div className="row-between">
                <span className="booking-name">{f(b.fields, 'Client Name', 'Name', 'Guest Name') || b.id}</span>
                <StatusChip status={f(b.fields, 'Status', CONFIG.FIELDS.BK_STATUS)} />
              </div>
              <div className="meta">
                <div className="meta-item"><b>{fmtDateShort(f(b.fields, 'Charter Date', CONFIG.FIELDS.BK_DATE))}</b></div>
                <div className="meta-item">{f(b.fields, 'Experience', 'Package', 'Charter Type') || '—'}</div>
                <div className="meta-item">{f(b.fields, 'Guest Count', 'Guests') || '—'} guests</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Urgent leads */}
      {urgentLeads.length > 0 && (
        <div className="section">
          <div className="section-header"><span className="section-title" style={{ color: 'var(--red)' }}>Waiting 12+ Hours — No Contact</span></div>
          {urgentLeads.slice(0, 3).map(lead => (
            <div key={lead.id} className="card red-border">
              <div className="row-between">
                <span className="lead-name">{f(lead.fields, 'First Name', 'Name') || '?'} {f(lead.fields, 'Last Name', '') || ''}</span>
                <span style={{ fontSize: 11, color: 'var(--red)' }}>{timeAgo(lead.createdTime)}</span>
              </div>
              <div className="meta">
                <div className="meta-item"><b>{f(lead.fields, 'Occasion') || '—'}</b></div>
                <div className="meta-item">{fmtDateShort(f(lead.fields, 'Preferred Date')) || '—'}</div>
              </div>
            </div>
          ))}
          {urgentLeads.length > 3 && <p style={{ color: 'var(--muted)', fontSize: 12, textAlign: 'center', padding: '4px 0' }}>+{urgentLeads.length - 3} more in Leads tab</p>}
        </div>
      )}

      {/* Last month comparison */}
      <div className="card" style={{ marginTop: 4 }}>
        <div className="row-between">
          <span className="section-title">Last Month</span>
          <span style={{ fontSize: 17, fontWeight: 600, color: 'var(--muted)' }}>{fmtMoney(lastMonthRevenue)}</span>
        </div>
      </div>
    </div>
  );
}

   DECISIONS TAB
   ═══════════════════════════════════════════════════════════════ */
function DecisionsTab({ approvals, loading, onApprove, onDeny, onModify, toast }) {
  const [modifyId, setModifyId] = React.useState(null);
  const [modNote, setModNote] = React.useState('');
  const [busy, setBusy] = React.useState({});

  if (!CONFIG.TABLES.APPROVAL_QUEUE) {
    return (
      <div className="empty">
        <Icon n="bell" sz={32} color="var(--border)" />
        <p style={{ marginTop: 12 }}>Approval Queue table not configured.</p>
        <p style={{ marginTop: 6, fontSize: 12 }}>Create it per <strong>airtable-schema.md</strong> then add the table ID to CONFIG.TABLES.APPROVAL_QUEUE.</p>
      </div>
    );
  }

  const pending = approvals.filter(a => {
    const d = f(a.fields, 'Decision');
    return !d || d === 'Pending';
  });

  const urgency = (a) => {
    const u = f(a.fields, 'Urgency') || '';
    if (u === 'URGENT') return 0;
    if (u === 'TODAY') return 1;
    if (u === 'THIS WEEK') return 2;
    return 3;
  };
  const sorted = [...pending].sort((a, b) => urgency(a) - urgency(b));

  const handle = async (id, decision, note = '') => {
    setBusy(prev => ({ ...prev, [id]: true }));
    try {
      await onApprove(id, decision, note);
      toast(`${decision} recorded.`, 'success');
    } catch (e) {
      toast(`Error: ${e.message}`, 'error');
    } finally {
      setBusy(prev => ({ ...prev, [id]: false }));
    }
  };

  const urgencyChip = (a) => {
    const u = f(a.fields, 'Urgency') || '';
    if (u === 'URGENT') return <span className="chip chip-red">URGENT</span>;
    if (u === 'TODAY') return <span className="chip chip-amber">TODAY</span>;
    return <span className="chip chip-muted">{u || 'THIS WEEK'}</span>;
  };

  const isFinancial = (a) => {
    const type = f(a.fields, 'Request Type') || '';
    return ['Refund','Discount','Comp','Payout','Expense'].some(t => type.includes(t));
  };

  if (loading) return <>{[1,2,3].map(i => <div key={i} className="card" style={{ marginBottom: 10 }}><Skel h={18} mb={8} /><Skel h={14} w="70%" mb={12} /><div className="row-wrap"><Skel h={38} w="80px" mb={0} /><Skel h={38} w="60px" mb={0} /></div></div>)}</>;
  if (sorted.length === 0) return <EmptyState msg="No pending decisions. You're clear." />;

  return (
    <div>
      <p className="section-title" style={{ marginBottom: 14 }}>{sorted.length} pending decision{sorted.length !== 1 ? 's' : ''}</p>
      {sorted.map(a => {
        const fin = isFinancial(a);
        const isBusy = busy[a.id];
        return (
          <div key={a.id} className="card" style={{ marginBottom: 10 }}>
            <div className="row-between" style={{ marginBottom: 6 }}>
              <span style={{ fontSize: 14, fontWeight: 600 }}>{f(a.fields, 'Request Title', 'Title') || 'Untitled Request'}</span>
              {urgencyChip(a)}
            </div>
            <p style={{ fontSize: 12, color: 'var(--muted)', lineHeight: 1.6, marginBottom: 8 }}>
              {f(a.fields, 'Proposed Action', 'Context', 'Details') || 'No details provided.'}
            </p>
            <div className="meta" style={{ marginBottom: 0 }}>
              {f(a.fields, 'Submitted By') && <div className="meta-item">From: <b>{f(a.fields, 'Submitted By')}</b></div>}
              {f(a.fields, 'Financial Impact') && <div className="meta-item">Impact: <b style={{ color: 'var(--amber)' }}>{fmtMoney(f(a.fields, 'Financial Impact'))}</b></div>}
              {f(a.fields, 'Request Type') && <div className="meta-item">Type: <b>{f(a.fields, 'Request Type')}</b></div>}
            </div>

            {modifyId === a.id ? (
              <div style={{ marginTop: 10 }}>
                <input
                  className="modal-input"
                  style={{ marginBottom: 10 }}
                  placeholder="Modified approval notes..."
                  value={modNote}
                  onChange={e => setModNote(e.target.value)}
                />
                <div className="row" style={{ gap: 8 }}>
                  <button className="btn btn-gold btn-sm" disabled={isBusy} onClick={() => handle(a.id, 'Modified', modNote).then(() => setModifyId(null))}>
                    SUBMIT MODIFICATION
                  </button>
                  <button className="btn btn-ghost btn-sm" onClick={() => setModifyId(null)}>CANCEL</button>
                </div>
              </div>
            ) : (
              <div className="row-wrap">
                {fin
                  ? <ConfirmBtn label="APPROVE" onConfirm={() => handle(a.id, 'Approved')} className="btn btn-gold btn-sm" />
                  : <button className="btn btn-gold btn-sm" disabled={isBusy} onClick={() => handle(a.id, 'Approved')}>APPROVE</button>
                }
                {fin
                  ? <ConfirmBtn label="DENY" onConfirm={() => handle(a.id, 'Denied')} className="btn btn-sm" />
                  : <button className="btn btn-ghost btn-sm" disabled={isBusy} onClick={() => handle(a.id, 'Denied')}>DENY</button>
                }
                <button className="btn btn-ghost btn-sm" onClick={() => { setModifyId(a.id); setModNote(''); }}>MODIFY</button>
                <button className="btn btn-ghost btn-sm" onClick={() => handle(a.id, 'Later')}>LATER</button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function LeadsTab({ leads, loading, onQualify, onNotFit, onHold, onSendHolding, toast }) {

  });

  const urgency = l => {
    const s = f(l.fields, 'Status', CONFIG.FIELDS.REQ_STATUS);
    if (s === 'NEW' && hoursAgo(l.createdTime) >= 12) return 0;
    if (s === 'NEW') return 1;
    if (s === 'HOLD') return 2;
    return 3;
  };
  const sorted = [...active].sort((a, b) => urgency(a) - urgency(b));

  const handleHold = async (lead) => {
    setBusy(prev => ({ ...prev, [lead.id]: true }));
    try { await onHold(lead); toast('Lead marked HOLD.', 'info'); }
    catch (e) { toast(`Error: ${e.message}`, 'error'); }
    finally { setBusy(prev => ({ ...prev, [lead.id]: false })); }
  };

  const handleNotFit = async (lead) => {
    setBusy(prev => ({ ...prev, [lead.id]: true }));
    try { await onNotFit(lead); toast('Lead closed.', 'info'); }
    catch (e) { toast(`Error: ${e.message}`, 'error'); }
    finally { setBusy(prev => ({ ...prev, [lead.id]: false })); }
  };

  const leadStatus = l => {
    const s = f(l.fields, 'Status', CONFIG.FIELDS.REQ_STATUS) || 'NEW';
    const h = hoursAgo(l.createdTime);
    if (s === 'NEW' && h >= 12) return { cls: 'red-border', badge: 'badge-red', label: `${h}h` };
    if (s === 'HOLD') return { cls: 'amber-border', badge: 'badge-amber', label: 'HOLD' };
    return { cls: '', badge: 'badge-muted', label: timeAgo(l.createdTime) };
  };

  if (loading) return <>{[1,2,3,4].map(i => <div key={i} className="card" style={{ marginBottom: 10 }}><Skel h={18} mb={8} /><Skel h={14} w="80%" mb={12} /><div className="row-wrap"><Skel h={38} w="90px" mb={0} /></div></div>)}</>;
  if (sorted.length === 0) return <EmptyState msg="No open leads right now." />;

  return (
    <div>
      {qualifyLead && (
        <QualifyModal
          lead={qualifyLead}
          onConfirm={async (lead, price) => {
            try {
              await onQualify(lead, price);
              toast('Lead qualified. Booking creation is underway.', 'success');
            } catch (e) { toast(`Error: ${e.message}`, 'error'); }
          }}
          onClose={() => setQualifyLead(null)}
        />
      )}
      {holdingLead && (
        <HoldingModal
          lead={holdingLead}
          onSend={async (lead, msg) => {
            try { await onSendHolding(lead, msg); toast('Holding message sent.', 'success'); }
            catch (e) { toast(`Error: ${e.message}`, 'error'); }
          }}
          onClose={() => setHoldingLead(null)}
        />
      )}

      <p className="section-title" style={{ marginBottom: 14 }}>{sorted.length} open lead{sorted.length !== 1 ? 's' : ''}</p>

      {sorted.map(lead => {
        const st = leadStatus(lead);
        const isBusy = busy[lead.id];
        const status = f(lead.fields, 'Status', CONFIG.FIELDS.REQ_STATUS) || 'NEW';
        return (
          <div key={lead.id} className={`card ${st.cls}`} style={{ marginBottom: 10 }}>
            <div className="row-between" style={{ marginBottom: 4 }}>
              <div className="row" style={{ gap: 8 }}>
                <span className="lead-name">
                  {f(lead.fields, 'First Name', 'Name') || '?'} {f(lead.fields, 'Last Name', '') || ''}
                </span>
                <StatusChip status={status} />
              </div>
              <span className={`badge ${st.badge}`}>{st.label}</span>
            </div>

            <div className="meta">
              <div className="meta-item"><b>{f(lead.fields, 'Occasion') || '—'}</b></div>
              <div className="meta-item">Date: <b>{fmtDateShort(f(lead.fields, 'Preferred Date'))}</b></div>
              <div className="meta-item">Guests: <b>{f(lead.fields, 'Guest Count', 'Guests') || '—'}</b></div>
              {f(lead.fields, 'Experience') && <div className="meta-item"><b>{f(lead.fields, 'Experience')}</b></div>}
            </div>

            <div className="meta" style={{ marginTop: 4 }}>
              <div className="meta-item">
                {f(lead.fields, 'Email') && <a href={`mailto:${f(lead.fields, 'Email')}`} style={{ color: 'var(--gold)', textDecoration: 'none' }}>{f(lead.fields, 'Email')}</a>}
              </div>
              {f(lead.fields, 'Phone') && (
                <div className="meta-item">
                  <a href={`tel:${f(lead.fields, 'Phone')}`} style={{ color: 'var(--muted)', textDecoration: 'none' }}>{f(lead.fields, 'Phone')}</a>
                </div>
              )}
            </div>

            <div className="row-wrap">
              <button className="btn btn-gold btn-sm" disabled={isBusy} onClick={() => setQualifyLead(lead)}>
                QUALIFY
              </button>
              <button className="btn btn-ghost btn-sm" disabled={isBusy} onClick={() => setHoldingLead(lead)}>
                HOLD MESSAGE
              </button>
              <button className="btn btn-ghost btn-sm" disabled={isBusy} onClick={() => handleHold(lead)}>
                HOLD
              </button>
              <ConfirmBtn label="NOT A FIT" confirmLabel="CLOSE?" onConfirm={() => handleNotFit(lead)} className="btn btn-ghost btn-sm" />
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   BOOKINGS TAB
   ═══════════════════════════════════════════════════════════════ */
function BookingsTab({ bookings, loading, onFlag, onBalanceReminder, toast }) {
  const [flagId, setFlagId] = React.useState(null);
  const [flagNote, setFlagNote] = React.useState('');
  const [busy, setBusy] = React.useState({});

  const active = bookings.filter(b => {
    const s = f(b.fields, 'Status', CONFIG.FIELDS.BK_STATUS);
    return !['COMPLETED','CANCELLED','VOID'].includes(s);
  });

  const sortFn = (a, b) => {
    const da = new Date(f(a.fields, 'Charter Date', CONFIG.FIELDS.BK_DATE) || '2099-01-01');
    const db = new Date(f(b.fields, 'Charter Date', CONFIG.FIELDS.BK_DATE) || '2099-01-01');
    return da - db;
  };

  const sorted = [...active].sort(sortFn);

  const handleFlag = async (bookingId) => {
    setBusy(prev => ({ ...prev, [bookingId]: true }));
    try {
      await onFlag(bookingId, flagNote);
      toast('Emergency flag set. Check Slack.', 'error');
      setFlagId(null); setFlagNote('');
    } catch (e) { toast(`Error: ${e.message}`, 'error'); }
    finally { setBusy(prev => ({ ...prev, [bookingId]: false })); }
  };

  const handleReminder = async (booking) => {
    setBusy(prev => ({ ...prev, [booking.id]: true }));
    try {
      await onBalanceReminder(booking);
      toast('Balance reminder sent.', 'success');
    } catch (e) { toast(`Error: ${e.message}`, 'error'); }
    finally { setBusy(prev => ({ ...prev, [booking.id]: false })); }
  };

  const isBalanceDue = b => {
    const s = f(b.fields, 'Status', CONFIG.FIELDS.BK_STATUS);
    const balance = f(b.fields, 'Balance Due', 'Balance Remaining', 'Balance');
    return s === 'BALANCE_DUE' || (balance && Number(balance) > 0 && ['CONFIRMED','AGREEMENT_PENDING'].includes(s));
  };

  const hasEmergency = b => f(b.fields, 'Emergency Flag', CONFIG.FIELDS.BK_EMERGENCY);

  if (loading) return <>{[1,2,3].map(i => <div key={i} className="card" style={{ marginBottom: 10 }}><Skel h={18} mb={8} /><Skel h={14} w="60%" mb={12} /><div className="row-wrap"><Skel h={38} w="100px" mb={0} /></div></div>)}</>;
  if (sorted.length === 0) return <EmptyState msg="No active bookings right now." />;

  return (
    <div>
      <p className="section-title" style={{ marginBottom: 14 }}>{sorted.length} active booking{sorted.length !== 1 ? 's' : ''}</p>
      {sorted.map(b => {
        const emergency = hasEmergency(b);
        const balDue = isBalanceDue(b);
        const isBusy = busy[b.id];
        const status = f(b.fields, 'Status', CONFIG.FIELDS.BK_STATUS);
        const date = f(b.fields, 'Charter Date', CONFIG.FIELDS.BK_DATE);
        const name = f(b.fields, 'Client Name', 'Name', 'Guest Name') || b.id;
        const revenue = f(b.fields, 'Total Revenue', 'Revenue', 'Charter Price', 'Total Amount');
        const balance = f(b.fields, 'Balance Due', 'Balance Remaining', 'Balance');

        return (
          <div key={b.id} className={`card ${emergency ? 'red-border' : balDue ? 'amber-border' : ''}`} style={{ marginBottom: 10 }}>
            <div className="row-between" style={{ marginBottom: 6 }}>
              <div className="row" style={{ gap: 8 }}>
                <span className="booking-name">{name}</span>
                {emergency && <span className="chip chip-red">EMERGENCY</span>}
              </div>
              <StatusChip status={status} />
            </div>

            <div className="meta">
              <div className="meta-item">Date: <b>{fmtDate(date)}</b></div>
              {f(b.fields, 'Experience', 'Package') && <div className="meta-item"><b>{f(b.fields, 'Experience', 'Package')}</b></div>}
              {f(b.fields, 'Guest Count', 'Guests') && <div className="meta-item"><b>{f(b.fields, 'Guest Count', 'Guests')}</b> guests</div>}
              {revenue && <div className="meta-item">Revenue: <b style={{ color: 'var(--gold)' }}>{fmtMoney(revenue)}</b></div>}
              {balance && Number(balance) > 0 && <div className="meta-item">Balance: <b style={{ color: 'var(--amber)' }}>{fmtMoney(balance)}</b></div>}
            </div>

            {flagId === b.id && (
              <div style={{ marginTop: 10 }}>
                <input
                  className="modal-input"
                  style={{ marginBottom: 8 }}
                  placeholder="Describe the issue..."
                  value={flagNote}
                  onChange={e => setFlagNote(e.target.value)}
                />
                <div className="row" style={{ gap: 8 }}>
                  <ConfirmBtn
                    label="SET EMERGENCY FLAG"
                    confirmLabel="CONFIRM FLAG?"
                    onConfirm={() => handleFlag(b.id)}
                    className="btn btn-red btn-sm"
                  />
                  <button className="btn btn-ghost btn-sm" onClick={() => setFlagId(null)}>CANCEL</button>
                </div>
              </div>
            )}

            <div className="row-wrap">
              {balDue && (
                <button className="btn btn-gold btn-sm" disabled={isBusy} onClick={() => handleReminder(b)}>
                  BALANCE REMINDER
                </button>
              )}
              {!emergency && flagId !== b.id && (
                <button className="btn btn-ghost btn-sm" onClick={() => setFlagId(b.id)}>
                  FLAG ISSUE
                </button>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   MONEY TAB
   ═══════════════════════════════════════════════════════════════ */
function MoneyTab({ bookings, loading }) {
  const revField = b => Number(f(b.fields, 'Total Revenue', 'Revenue', 'Charter Price', 'Total Amount')) || 0;
  const dateField = b => f(b.fields, 'Charter Date', CONFIG.FIELDS.BK_DATE);
  const balanceField = b => Number(f(b.fields, 'Balance Due', 'Balance Remaining', 'Balance')) || 0;

  const thisMonthAll = bookings.filter(b => inMonth(dateField(b), 0));
  const thisMonthPaid = thisMonthAll.filter(b => ['PAID','COMPLETED'].includes(f(b.fields, 'Status', CONFIG.FIELDS.BK_STATUS)));
  const lastMonthPaid = bookings.filter(b => inMonth(dateField(b), -1) && ['PAID','COMPLETED'].includes(f(b.fields, 'Status', CONFIG.FIELDS.BK_STATUS)));

  const thisRev = sum(thisMonthPaid, revField);
  const lastRev = sum(lastMonthPaid, revField);
  const outstanding = bookings.filter(b => balanceField(b) > 0 && !['COMPLETED','CANCELLED','VOID'].includes(f(b.fields, 'Status', CONFIG.FIELDS.BK_STATUS)));
  const totalOutstanding = sum(outstanding, balanceField);

  const thisWeekBookings = bookings.filter(b => {
    const d = new Date(dateField(b));
    const now = new Date();
    const weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay());
    const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);
    return d >= weekStart && d <= weekEnd && ['PAID','COMPLETED'].includes(f(b.fields, 'Status', CONFIG.FIELDS.BK_STATUS));
  });
  const weekRev = sum(thisWeekBookings, revField);

  const topBookings = [...thisMonthAll]
    .sort((a, b) => revField(b) - revField(a))
    .slice(0, 3);

  if (loading) return <><div className="stat-row"><div className="stat"><Skel h={28} mb={4} /><Skel h={12} w="60%" /></div><div className="stat"><Skel h={28} mb={4} /><Skel h={12} w="60%" /></div></div></>;

  return (
    <div>
      <div className="stat-row">
        <div className="stat gold">
          <div className="stat-val">{fmtMoney(thisRev)}</div>
          <div className="stat-lbl">This Month (Paid)</div>
        </div>
        <div className="stat">
          <div className="stat-val" style={{ color: 'var(--muted)' }}>{fmtMoney(lastRev)}</div>
          <div className="stat-lbl">Last Month</div>
        </div>
      </div>

      <div className="stat-row">
        <div className={`stat${totalOutstanding > 0 ? ' amber' : ''}`}>
          <div className="stat-val" style={totalOutstanding === 0 ? { color: 'var(--text)' } : {}}>
            {fmtMoney(totalOutstanding)}
          </div>
          <div className="stat-lbl">Outstanding</div>
        </div>
        <div className="stat">
          <div className="stat-val" style={{ color: 'var(--text)' }}>{fmtMoney(weekRev)}</div>
          <div className="stat-lbl">This Week</div>
        </div>
      </div>

      {/* Outstanding balances */}
      {outstanding.length > 0 && (
        <div className="section">
          <div className="section-header"><span className="section-title">Outstanding Balances</span></div>
          {outstanding.map(b => (
            <div key={b.id} className="card amber-border" style={{ marginBottom: 8 }}>
              <div className="row-between">
                <span style={{ fontSize: 14, fontWeight: 500 }}>{f(b.fields, 'Client Name', 'Name') || b.id}</span>
                <span style={{ color: 'var(--amber)', fontWeight: 600 }}>{fmtMoney(balanceField(b))}</span>
              </div>
              <div className="meta">
                <div className="meta-item">Due: <b>{fmtDate(dateField(b))}</b></div>
                <StatusChip status={f(b.fields, 'Status', CONFIG.FIELDS.BK_STATUS)} />
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Top bookings */}
      {topBookings.length > 0 && (
        <div className="section">
          <div className="section-header"><span className="section-title">Top Bookings This Month</span></div>
          {topBookings.map((b, i) => (
            <div key={b.id} className="card" style={{ marginBottom: 8 }}>
              <div className="row-between">
                <div className="row" style={{ gap: 10 }}>
                  <span style={{ color: 'var(--muted)', fontSize: 13, fontWeight: 700, width: 18 }}>#{i+1}</span>
                  <span style={{ fontSize: 14, fontWeight: 500 }}>{f(b.fields, 'Client Name', 'Name') || b.id}</span>
                </div>
                <span style={{ color: 'var(--gold)', fontWeight: 600 }}>{fmtMoney(revField(b))}</span>
              </div>
              <div className="meta">
                <div className="meta-item">{fmtDate(dateField(b))}</div>
                <div className="meta-item">{f(b.fields, 'Experience', 'Package') || '—'}</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {thisMonthAll.length === 0 && lastRev === 0 && (
        <div className="card" style={{ marginTop: 8 }}>
          <p style={{ color: 'var(--muted)', fontSize: 13, lineHeight: 1.6 }}>
            Financial data reads from Bookings table fields: <code style={{ color: 'var(--gold)' }}>Total Revenue</code>, <code style={{ color: 'var(--gold)' }}>Balance Due</code>, <code style={{ color: 'var(--gold)' }}>Charter Date</code>.
            Verify these field names match your Airtable schema.
          </p>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   PEOPLE TAB
   ═══════════════════════════════════════════════════════════════ */
function PeopleTab({ clients, loading, onLogContact, toast }) {
  const [busy, setBusy] = React.useState({});

  const getName = c => f(c.fields, 'Full Name', 'Name', 'Client Name') || `${f(c.fields,'First Name','')||''} ${f(c.fields,'Last Name','')||''}`.trim() || c.id;
  const lastContacted = c => {
    const d = f(c.fields, 'Last Contacted', 'Last Contact Date', 'Last Contact');
    return d ? daysAgo(d) : 999;
  };
  const isHV = c => f(c.fields, 'HV Flag', CONFIG.FIELDS.CL_HV, 'High Value') === true || f(c.fields, 'HV Flag', CONFIG.FIELDS.CL_HV, 'High Value') === 1;
  const isBroker = c => {
    const t = f(c.fields, 'Client Type', 'Type', 'Category') || '';
    return t.toLowerCase().includes('broker') || t.toLowerCase().includes('planner');
  };

  const getBirthday = c => f(c.fields, 'Birthday', 'Birth Date', 'Anniversary');
  const upcomingBirthday = c => {
    const bday = getBirthday(c);
    if (!bday) return false;
    const d = new Date(bday);
    const now = new Date();
    const thisYear = new Date(now.getFullYear(), d.getMonth(), d.getDate());
    const diff = (thisYear - now) / 86400000;
    return diff >= 0 && diff <= 30;
  };

  const hvStale = clients.filter(c => isHV(c) && lastContacted(c) >= 30);
  const brokersQuiet = clients.filter(c => isBroker(c) && lastContacted(c) >= 45);
  const birthdays = clients.filter(c => upcomingBirthday(c));
  const pastClientsUnrebooked = clients.filter(c => {
    const lb = f(c.fields, 'Last Booking Date', 'Last Charter Date');
    return lb && daysAgo(lb) >= 90 && !isBroker(c) && lastContacted(c) <= 90;
  });

  const handleLog = async (client) => {
    setBusy(prev => ({ ...prev, [client.id]: true }));
    try {
      await onLogContact(client);
      toast('Contact logged.', 'success');
    } catch (e) { toast(`Error: ${e.message}`, 'error'); }
    finally { setBusy(prev => ({ ...prev, [client.id]: false })); }
  };

  const ClientCard = ({ client, reason, borderCls }) => (
    <div className={`card ${borderCls}`} style={{ marginBottom: 8 }}>
      <div className="row-between">
        <div>
          <span style={{ fontSize: 14, fontWeight: 500 }}>{getName(client)}</span>
          {isHV(client) && <span className="chip chip-gold" style={{ marginLeft: 8 }}>HV</span>}
          {isBroker(client) && <span className="chip chip-muted" style={{ marginLeft: 4 }}>BROKER</span>}
        </div>
      </div>
      <div className="meta">
        <div className="meta-item" style={{ color: reason.color || 'var(--muted)' }}>{reason.text}</div>
        {f(client.fields, 'Email') && (
          <div className="meta-item">
            <a href={`mailto:${f(client.fields,'Email')}`} style={{ color: 'var(--muted)', textDecoration: 'none' }}>Email</a>
          </div>
        )}
        {f(client.fields, 'Phone') && (
          <div className="meta-item">
            <a href={`tel:${f(client.fields,'Phone')}`} style={{ color: 'var(--muted)', textDecoration: 'none' }}>Call</a>
          </div>
        )}
      </div>
      <div className="row-wrap">
        <button className="btn btn-ghost btn-sm" disabled={busy[client.id]} onClick={() => handleLog(client)}>
          LOG CONTACT
        </button>
        {f(client.fields, 'Email') && (
          <a href={`mailto:${f(client.fields,'Email')}`} className="btn btn-ghost btn-sm" style={{ textDecoration: 'none', color: 'var(--muted)' }}>
            SEND EMAIL
          </a>
        )}
        {f(client.fields, 'Phone') && (
          <a href={`tel:${f(client.fields,'Phone')}`} className="btn btn-ghost btn-sm" style={{ textDecoration: 'none', color: 'var(--muted)' }}>
            CALL
          </a>
        )}
      </div>
    </div>
  );

  if (loading) return <>{[1,2,3].map(i => <div key={i} className="card" style={{ marginBottom: 10 }}><Skel h={18} mb={8} /><Skel h={14} w="70%" mb={12} /></div>)}</>;

  const hasContent = hvStale.length + brokersQuiet.length + birthdays.length + pastClientsUnrebooked.length > 0;
  if (!hasContent) return <EmptyState msg="All relationships are current. Check back Monday." />;

  return (
    <div>
      {birthdays.length > 0 && (
        <div className="section">
          <div className="section-header"><span className="section-title" style={{ color: 'var(--gold)' }}>Birthdays in the Next 30 Days</span></div>
          {birthdays.map(c => (
            <ClientCard key={c.id} client={c} borderCls="gold-border"
              reason={{ text: `Birthday: ${fmtDateShort(getBirthday(c))}`, color: 'var(--gold)' }} />
          ))}
        </div>
      )}

      {hvStale.length > 0 && (
        <div className="section">
          <div className="section-header"><span className="section-title" style={{ color: 'var(--amber)' }}>HV Clients — No Contact 30+ Days</span></div>
          {hvStale.map(c => (
            <ClientCard key={c.id} client={c} borderCls="amber-border"
              reason={{ text: lastContacted(c) >= 999 ? 'Never logged' : `Last contact ${lastContacted(c)}d ago`, color: 'var(--amber)' }} />
          ))}
        </div>
      )}

      {brokersQuiet.length > 0 && (
        <div className="section">
          <div className="section-header"><span className="section-title" style={{ color: 'var(--amber)' }}>Brokers Gone Quiet — 45+ Days</span></div>
          {brokersQuiet.map(c => (
            <ClientCard key={c.id} client={c} borderCls="amber-border"
              reason={{ text: `${lastContacted(c)}d since last contact`, color: 'var(--amber)' }} />
          ))}
        </div>
      )}

      {pastClientsUnrebooked.length > 0 && (
        <div className="section">
          <div className="section-header"><span className="section-title">Past Clients — Not Rebooked 90+ Days</span></div>
          {pastClientsUnrebooked.slice(0, 6).map(c => (
            <ClientCard key={c.id} client={c} borderCls=""
              reason={{ text: `Last charter ${daysAgo(f(c.fields,'Last Booking Date','Last Charter Date'))}d ago` }} />
          ))}
        </div>
      )}
    </div>
  );
}

          </div>
          <div className="row-wrap">
            <ConfirmBtn label="PAUSE" confirmLabel="PAUSE CAMPAIGN?" onConfirm={() => toast('Logged to Founder Decisions. Update in ad platform.', 'info')} className="btn btn-ghost btn-sm" />
            <ConfirmBtn label="SCALE" confirmLabel="INCREASE BUDGET?" onConfirm={() => toast('Logged to Founder Decisions. Update in ad platform.', 'info')} className="btn btn-gold btn-sm" />
          </div>
        </div>
      ))}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   AI CHAT DRAWER
   ═══════════════════════════════════════════════════════════════ */
function AIChatDrawer({ onClose, contextData }) {
  const [msgs, setMsgs] = React.useState([]);
  const [input, setInput] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const endRef = React.useRef(null);

  React.useEffect(() => {
    if (endRef.current) endRef.current.scrollIntoView({ behavior: 'smooth' });
  }, [msgs]);

  const systemPrompt = `You are the She Said Sail operating intelligence. You help the founder make fast, confident decisions.

Answer concisely. Surface risks first. Never invent facts. When data is unavailable, say so.

Current business snapshot:
- Open leads: ${contextData.leadCount}
- Leads waiting 12h+ without response: ${contextData.urgentLeads}
- Active bookings: ${contextData.bookingCount}
- Today's charters: ${contextData.todayCount}
- Pending approvals: ${contextData.pendingApprovals}
- This month revenue: ${fmtMoney(contextData.thisMonthRev)}
- Outstanding balances: ${fmtMoney(contextData.outstanding)}

Brand rules: SSS = women-led celebrations. ME = corporate/executive hospitality. Never cross-contaminate brand voice.
AI authority: You may recommend, draft, and analyze. You may not approve payouts, authorize discounts above threshold, or take autonomous financial actions.`;

  const send = async () => {
    const text = input.trim();
    if (!text || loading) return;
    setInput('');
    const userMsg = { role: 'user', content: text };
    setMsgs(prev => [...prev, { type: 'user', text }]);
    setLoading(true);

    if (!CONFIG.ANTHROPIC_KEY) {
      setMsgs(prev => [...prev, { type: 'err', text: 'ANTHROPIC_KEY not set in CONFIG. Add your Anthropic API key to enable AI chat.' }]);
      setLoading(false); return;
    }

    try {
      const history = msgs.filter(m => m.type !== 'err').map(m => ({
        role: m.type === 'user' ? 'user' : 'assistant',
        content: m.text,
      }));
      history.push(userMsg);

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': CONFIG.ANTHROPIC_KEY,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: CONFIG.AI_MODEL,
          max_tokens: 1024,
          system: systemPrompt,
          messages: history,
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `HTTP ${res.status}`);
      }
      const data = await res.json();
      const reply = data.content?.[0]?.text || 'No response.';
      setMsgs(prev => [...prev, { type: 'ai', text: reply }]);
    } catch (e) {
      setMsgs(prev => [...prev, { type: 'err', text: `Error: ${e.message}` }]);
    } finally { setLoading(false); }
  };

  return (
    <>
      <div className="overlay" onClick={onClose} />
      <div className="drawer">
        <div className="drawer-handle" />
        <div className="drawer-inner">
          <div className="row-between" style={{ marginBottom: 12 }}>
            <p className="drawer-title" style={{ margin: 0 }}>Ask anything about the business</p>
            <button className="btn btn-ghost btn-sm" style={{ height: 30, padding: '0 10px' }} onClick={onClose}>
              <Icon n="x" sz={14} />
            </button>
          </div>

          <div className="chat-msgs">
            {msgs.length === 0 && (
              <div style={{ padding: '20px 0', textAlign: 'center' }}>
                <p style={{ color: 'var(--muted)', fontSize: 13 }}>Ask about leads, bookings, revenue, relationships, or anything operational.</p>
              </div>
            )}
            {msgs.map((m, i) => (
              <div key={i} className={`chat-msg ${m.type === 'user' ? 'user' : m.type === 'err' ? 'err' : 'ai'}`}>
                {m.text}
              </div>
            ))}
            {loading && (
              <div className="chat-msg ai">
                <span className="skel" style={{ display: 'inline-block', width: 60, height: 14 }} />
              </div>
            )}
            <div ref={endRef} />
          </div>

          <div className="chat-row">
            <textarea
              className="chat-input"
              placeholder="Ask anything..."
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
              rows={1}
            />
            <button className="btn btn-gold" style={{ height: 42, padding: '0 14px', flexShrink: 0 }} onClick={send} disabled={loading || !input.trim()}>
              <Icon n="send" sz={16} color="#0a0a0a" />
            </button>
          </div>
        </div>
      </div>
    </>
  );
}

/* ═══════════════════════════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════════════════════════ */
function App() {
  const [authed,     setAuthed]     = React.useState(false);
  const [configured, setConfigured] = React.useState(true);
  const [tab,        setTab]        = React.useState('pulse');
  const [chatOpen,   setChatOpen]   = React.useState(false);
  const [loading,    setLoading]    = React.useState(true);
  const [toasts,     setToasts]     = React.useState([]);
  const [lastFetched,setLastFetched]= React.useState(null);

  const [leads,     setLeads]     = React.useState([]);
  const [bookings,  setBookings]  = React.useState([]);
  const [clients,   setClients]   = React.useState([]);
  const [approvals, setApprovals] = React.useState([]);

  /* Hide splash once mounted */
  React.useEffect(() => {
    const el = document.getElementById('splash');
    if (el) el.style.display = 'none';
  }, []);

  React.useEffect(() => {
    if (!CONFIG.AIRTABLE_TOKEN) { setConfigured(false); return; }
    const session = JSON.parse(localStorage.getItem('sss_portal_session') || 'null');
    if (session && session.expiry > Date.now()) setAuthed(true);
  }, []);

  const toast = React.useCallback((msg, type = 'success') => {
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev, { id, msg, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
  }, []);

  const fetchData = React.useCallback(async () => {
    if (!authed || !CONFIG.AIRTABLE_TOKEN) return;
    setLoading(true);
    const results = await Promise.allSettled([
      AT.getAll(CONFIG.TABLES.REQUESTS, {
        filterByFormula: "NOT(OR({Status}='CLOSED',{Status}='VOID'))",
        sort: [{ field: 'Created', direction: 'desc' }],
      }),
      AT.getAll(CONFIG.TABLES.BOOKINGS, {
        sort: [{ field: 'Charter Date', direction: 'asc' }],
      }),
      AT.getAll(CONFIG.TABLES.CLIENTS, {
        sort: [{ field: 'Name', direction: 'asc' }],
      }),
    ]);

    if (results[0].status === 'fulfilled') setLeads(results[0].value);
    else toast(`Leads fetch error: ${results[0].reason.message}`, 'error');

    if (results[1].status === 'fulfilled') setBookings(results[1].value);
    else toast(`Bookings fetch error: ${results[1].reason.message}`, 'error');

    if (results[2].status === 'fulfilled') setClients(results[2].value);

    if (CONFIG.TABLES.APPROVAL_QUEUE) {
      try {
        const approvalsData = await AT.getAll(CONFIG.TABLES.APPROVAL_QUEUE, {
          filterByFormula: "OR({Decision}='Pending', {Decision}='')",
          sort: [{ field: 'Urgency', direction: 'desc' }],
        });
        setApprovals(approvalsData);
      } catch (e) { /* silent — table may not exist */ }
    }

    setLastFetched(new Date());
    setLoading(false);
  }, [authed, toast]);

  React.useEffect(() => { if (authed) fetchData(); }, [authed, fetchData]);
  React.useEffect(() => {
    if (!authed) return;
    const id = setInterval(fetchData, 300000);
    return () => clearInterval(id);
  }, [authed, fetchData]);

  /* ── ACTION HANDLERS ─────────────────────────────────────── */

  /* QUALIFY: set Base Price + AVAILABILITY_CONFIRMED → triggers M-BOOKING-CREATION */
  const handleQualify = React.useCallback(async (lead, price) => {
    await AT.patch(CONFIG.TABLES.REQUESTS, lead.id, {
      'Base Price': price,
      [CONFIG.FIELDS.REQ_STATUS]: 'AVAILABILITY_CONFIRMED',
    });
    await auditLog('Lead Qualified', `Lead ${lead.id} set to AVAILABILITY_CONFIRMED with base price ${price}. M-BOOKING-CREATION will trigger.`, lead.id);
    setLeads(prev => prev.filter(l => l.id !== lead.id));
  }, []);

  const handleNotFit = React.useCallback(async (lead) => {
    await AT.patch(CONFIG.TABLES.REQUESTS, lead.id, { [CONFIG.FIELDS.REQ_STATUS]: 'CLOSED' });
    await auditLog('Lead Closed', `Lead ${lead.id} marked NOT A FIT from portal.`, lead.id);
    setLeads(prev => prev.filter(l => l.id !== lead.id));
  }, []);

  const handleHold = React.useCallback(async (lead) => {
    await AT.patch(CONFIG.TABLES.REQUESTS, lead.id, { [CONFIG.FIELDS.REQ_STATUS]: 'HOLD' });
    await auditLog('Lead Held', `Lead ${lead.id} placed on HOLD from portal.`, lead.id);
    setLeads(prev => prev.map(l => l.id === lead.id ? { ...l, fields: { ...l.fields, Status: 'HOLD' } } : l));
  }, []);

  const handleSendHolding = React.useCallback(async (lead, msg) => {
    if (!CONFIG.WEBHOOKS.HOLDING_MESSAGE) throw new Error('WEBHOOKS.HOLDING_MESSAGE not configured in CONFIG');
    const res = await fetch(CONFIG.WEBHOOKS.HOLDING_MESSAGE, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        lead_id: lead.id,
        email: f(lead.fields, 'Email'),
        first_name: f(lead.fields, 'First Name', 'Name'),
        message: msg,
      }),
    });
    if (!res.ok) throw new Error(`Webhook returned ${res.status}`);
    await auditLog('Holding Message Sent', `Holding message sent to ${f(lead.fields,'Email')} for lead ${lead.id}.`, lead.id);
  }, []);

  const handleApprovalDecision = React.useCallback(async (approvalId, decision, note = '') => {
    const fields = {
      'Decision': decision,
      'Decided At': new Date().toISOString(),
    };
    if (note) fields['Decision Note'] = note;
    await AT.patch(CONFIG.TABLES.APPROVAL_QUEUE, approvalId, fields);
    await auditLog(`Approval ${decision}`, `Approval ${approvalId} ${decision}${note ? ': ' + note : ''} from portal.`, approvalId);
    setApprovals(prev => prev.filter(a => a.id !== approvalId));
  }, []);

  const handleFlag = React.useCallback(async (bookingId, note) => {
    await AT.patch(CONFIG.TABLES.BOOKINGS, bookingId, {
      [CONFIG.FIELDS.BK_EMERGENCY]: true,
      'Emergency_Notes': note,
    });
    await auditLog('Emergency Flag Set', `Booking ${bookingId} flagged: ${note}`, bookingId);
    setBookings(prev => prev.map(b => b.id === bookingId
      ? { ...b, fields: { ...b.fields, 'Emergency Flag': true } }
      : b
    ));
  }, []);

  const handleBalanceReminder = React.useCallback(async (booking) => {
    if (!CONFIG.WEBHOOKS.BALANCE_REMINDER) throw new Error('WEBHOOKS.BALANCE_REMINDER not configured in CONFIG');
    const res = await fetch(CONFIG.WEBHOOKS.BALANCE_REMINDER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        booking_id: booking.id,
        client_email: f(booking.fields, 'Client Email', 'Email'),
        client_name: f(booking.fields, 'Client Name', 'Name'),
        balance: f(booking.fields, 'Balance Due', 'Balance'),
        charter_date: f(booking.fields, 'Charter Date', CONFIG.FIELDS.BK_DATE),
      }),
    });
    if (!res.ok) throw new Error(`Webhook returned ${res.status}`);
    await auditLog('Balance Reminder Sent', `Balance reminder sent for booking ${booking.id}.`, booking.id);
  }, []);

  const handleLogContact = React.useCallback(async (client) => {
    await AT.patch(CONFIG.TABLES.CLIENTS, client.id, {
      'Last Contacted': new Date().toISOString().split('T')[0],
      'Last Contact Date': new Date().toISOString().split('T')[0],
    });
    await auditLog('Contact Logged', `Contact logged for client ${client.id} from portal.`, client.id);
    setClients(prev => prev.map(c => c.id === client.id
      ? { ...c, fields: { ...c.fields, 'Last Contacted': new Date().toISOString().split('T')[0] } }
      : c
    ));
  }, []);

  /* ── RENDER ──────────────────────────────────────────────── */
  if (!configured) return <SetupScreen />;
  if (!authed) {
    return <AuthGate onAuth={() => {
      localStorage.setItem('sss_portal_session', JSON.stringify({ expiry: Date.now() + 86400000 }));
      setAuthed(true);
    }} />;
  }

  const emergencies = bookings.filter(b => f(b.fields, 'Emergency Flag', CONFIG.FIELDS.BK_EMERGENCY));
  const pendingApprovals = approvals.filter(a => { const d = f(a.fields, 'Decision'); return !d || d === 'Pending'; });
  const urgentLeads = leads.filter(l => f(l.fields, 'Status', CONFIG.FIELDS.REQ_STATUS) === 'NEW' && hoursAgo(l.createdTime) >= 12);

  const badges = {
    pulse:     0,
    decisions: pendingApprovals.length,
    leads:     urgentLeads.length,
    bookings:  emergencies.length,
    money:     0,
    people:    0,
    marketing: 0,
  };

  /* Context data for AI chat */
  const thisMonthRev = sum(
    bookings.filter(b => inMonth(f(b.fields,'Charter Date',CONFIG.FIELDS.BK_DATE), 0) && ['PAID','COMPLETED'].includes(f(b.fields,'Status',CONFIG.FIELDS.BK_STATUS))),
    b => Number(f(b.fields,'Total Revenue','Revenue','Charter Price','Total Amount')) || 0
  );
  const outstanding = sum(
    bookings.filter(b => !['COMPLETED','CANCELLED','VOID'].includes(f(b.fields,'Status',CONFIG.FIELDS.BK_STATUS))),
    b => Number(f(b.fields,'Balance Due','Balance Remaining','Balance')) || 0
  );

  const aiContext = {
    leadCount: leads.filter(l => !['CLOSED','VOID'].includes(f(l.fields,'Status',CONFIG.FIELDS.REQ_STATUS))).length,
    urgentLeads: urgentLeads.length,
    bookingCount: bookings.filter(b => !['COMPLETED','CANCELLED','VOID'].includes(f(b.fields,'Status',CONFIG.FIELDS.BK_STATUS))).length,
    todayCount: bookings.filter(b => isToday(f(b.fields,'Charter Date',CONFIG.FIELDS.BK_DATE))).length,
    pendingApprovals: pendingApprovals.length,
    thisMonthRev,
    outstanding,
  };

  return (
    <div className="screen">
      <ToastContainer toasts={toasts} />

      <EmergencyBanner bookings={emergencies} />

      <div className="content">
        {/* Header */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
          <div>
            <p style={{ color: 'var(--gold)', fontSize: 9.5, letterSpacing: 2.5, textTransform: 'uppercase' }}>She Said Sail</p>
            <p style={{ fontSize: 18, fontWeight: 600, marginTop: 1 }}>
              {{ pulse: 'Pulse', decisions: 'Decisions', leads: 'Leads', bookings: 'Bookings', money: 'Money', people: 'People', marketing: 'Ads' }[tab]}
            </p>
          </div>
          <button
            className="btn btn-ghost btn-sm"
            style={{ height: 32, padding: '0 12px', fontSize: 11 }}
            onClick={() => { localStorage.removeItem('sss_portal_session'); setAuthed(false); }}
          >
            <Icon n="logout" sz={14} />
          </button>
        </div>

        {tab === 'pulse' && (
          <PulseTab leads={leads} bookings={bookings} approvals={approvals} loading={loading} lastFetched={lastFetched} onRefresh={fetchData} />
        )}
        {tab === 'decisions' && (
          <DecisionsTab approvals={approvals} loading={loading} onApprove={handleApprovalDecision} onDeny={handleApprovalDecision} toast={toast} />
        )}
        {tab === 'leads' && (
          <LeadsTab leads={leads} loading={loading} onQualify={handleQualify} onNotFit={handleNotFit} onHold={handleHold} onSendHolding={handleSendHolding} toast={toast} />
        )}
        {tab === 'bookings' && (
          <BookingsTab bookings={bookings} loading={loading} onFlag={handleFlag} onBalanceReminder={handleBalanceReminder} toast={toast} />
        )}
        {tab === 'money' && (
          <MoneyTab bookings={bookings} loading={loading} />
        )}
        {tab === 'people' && (
          <PeopleTab clients={clients} loading={loading} onLogContact={handleLogContact} toast={toast} />
        )}
        {tab === 'marketing' && (
          <MarketingTab toast={toast} />
        )}
      </div>

      <TabBar active={tab} onChange={setTab} badges={badges} />

      {/* Floating AI chat button */}
      <button className="fab" onClick={() => setChatOpen(true)} title="Ask the portal AI">
        <Icon n="chat" sz={22} color="#0a0a0a" />
      </button>

      {chatOpen && <AIChatDrawer onClose={() => setChatOpen(false)} contextData={aiContext} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
